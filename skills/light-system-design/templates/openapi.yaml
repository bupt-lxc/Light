# EXAMPLE ONLY; not production-ready.
# OpenAPI 3.1.0 is chosen for broad validator support, not because it is the
# latest published version. Re-select after checking project tooling.
openapi: 3.1.0
info:
  title: Experiment Tracking API Example
  version: 1.0.0
servers:
  - url: https://api.example.invalid/v1
paths:
  /experiments:
    get:
      operationId: listExperiments
      parameters:
        - name: cursor
          in: query
          schema:
            type:
              - string
              - "null"
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: A cursor page.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentPage"
              examples:
                default:
                  value:
                    items:
                      - id: exp_01
                        title: Baseline run
                        status: running
                    next_cursor: null
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createExperiment
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExperimentCreate"
            examples:
              default:
                value:
                  title: Baseline run
      responses:
        "201":
          description: Created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Experiment"
              examples:
                default:
                  value:
                    id: exp_01
                    title: Baseline run
                    status: draft
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Experiment:
      type: object
      additionalProperties: false
      required: [id, title, status]
      properties:
        id:
          type: string
        title:
          type: string
          minLength: 1
        status:
          type: string
          enum: [draft, running, complete]
    ExperimentCreate:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
    ExperimentPage:
      type: object
      additionalProperties: false
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Experiment"
        next_cursor:
          type:
            - string
            - "null"
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri-reference
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            default:
              value:
                type: https://api.example.invalid/problems/unauthorized
                title: Unauthorized
                status: 401
    ValidationError:
      description: Request validation failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
          examples:
            default:
              value:
                type: https://api.example.invalid/problems/validation
                title: Validation failed
                status: 422
security:
  - bearerAuth: []
