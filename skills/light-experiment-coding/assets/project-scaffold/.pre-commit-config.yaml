# Ruff lint + format 钩子。rev 锁不可变 tag (2026-06-19 一手核 GitHub releases 最新)。
# 用 `pre-commit autoupdate` 升级 rev；CI 跑 `pre-commit run --all-files`。
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  # ── experiment-coding 科研特化本地门(通用 linter 不带)──────────────────────
  # review_gate：硬编码密钥/eval/shell/SQL 拼接/数据泄漏(fit 早于划分)/浮点==,Critical→exit 1。
  # seed_audit：随机种子覆盖度(漏 PYTHONHASHSEED/cuDNN/DataLoader worker → exit 1)。
  # 把这两个脚本随项目放在 scripts/ 下(从 light-experiment-coding/scripts 复制),或改 entry 指向技能树。
  - repo: local
    hooks:
      - id: review-gate
        name: review_gate (security + 数据泄漏 + 浮点==)
        entry: python scripts/review_gate.py
        language: system
        types: [python]
        pass_filenames: true
      - id: seed-audit
        name: seed_audit (随机种子覆盖度)
        entry: python scripts/seed_audit.py
        language: system
        types: [python]
        pass_filenames: true
