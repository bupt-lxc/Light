# .light/ 主张-证据登记表 (claims registry) —— 证据强度↔措辞一致性的单一事实源
# 用途：把 result-analysis(result-analysis)算出的每条主张证据档(strong/moderate/weak/none)
#       变成跨材料(论文/PPT/摘要/软著/标书)可执行的措辞上限约束。
# 审计脚本 consistency_audit.py 的 CLAIM_STRENGTH_DRIFT 检测读取本表：
#   若某主张在任一材料里用了「强于其证据档」的措辞(result-analysis 标 weak 却写"显著优于/达到SOTA")
#   → 报 ERROR，定位到 材料:行号。
#
# 这是裸模型与所有竞品(Vale/Acrolinx/Xbench)都没有的维度:它们只对齐"词面",
# 不对齐"主张强度是否与证据匹配"。审稿人最恨 PPT 把论文谨慎结论吹成确定结论。
#
# 措辞档机械映射由 _shared/evidence_contract.py(light.evidence_strength.v1)提供:
#   strong : 可用 demonstrate/establish/show；不禁
#   moderate: 可用 show/indicate/improve；禁 prove/demonstrate/establish
#   weak   : 仅 suggest/may/appear，且必须 hedge；禁 demonstrate/significantly/outperform/SOTA
#   none   : 仅 "no significant difference"，禁一切断言动词
#
# 字段说明：
#   claim_id        : 稳定标识(与 result-analysis claim_evidence_table 的 claim_id 对齐)
#   text            : 主张的标准措辞(英文/中文)
#   keywords        : 用于在材料里定位"哪行在讲这条主张"的关键词(命中即视为该行表述此主张)
#   evidence_grade  : strong | moderate | weak | none —— 由 result-analysis 写入(可省，则下面三件套现算)
#   q_fdr/effect_size/ci95/n : 原始统计量(给了则 evidence_grade 可由 evidence_contract 现算)
#   forbidden_zh    : 该档在中文材料里禁用的受控短语(中文无法靠英文动词表覆盖，显式列)
#   provenance      : 真实 source + locator + status=confirmed，由 memory-pm 在人确认后写入。

schema_version: "1.0"
source: "result-analysis:claim_evidence_table"
authority:
  owner: "memory-pm"
  updated_at: "2026-07-01"

claims:
  - claim_id: c1
    text: "DCA-Net improves F1 over YOLOv8 on CrowdScene-2k"
    keywords: ["DCA-Net", "F1", "提升", "improve", "优于"]
    evidence_grade: strong          # result-analysis: q<.01, d=0.9, n=120, CI 不跨 0
    q_fdr: 0.001
    effect_size: 0.9
    ci95: [0.4, 1.3]
    n: 120
    forbidden_zh: []                # 强证据中文不额外限
    provenance: {status: example_only, source: "示例事实源", locator: "需替换为真实 Results 表/统计输出"}

  - claim_id: c2
    text: "the SFP module reduces small-object miss rate"
    keywords: ["SFP", "漏检", "miss", "召回", "recall"]
    evidence_grade: weak            # result-analysis: 显著但小效应 d=0.2，单数据集
    q_fdr: 0.03
    effect_size: 0.2
    ci95: [0.05, 0.4]
    n: 200
    forbidden_zh: ["显著", "大幅", "证明", "SOTA", "最优", "remarkably"]
    provenance: {status: example_only, source: "示例事实源", locator: "需替换为真实消融表/统计输出"}

  - claim_id: c3
    text: "the method generalizes across domains"
    keywords: ["泛化", "generaliz", "跨域", "domain"]
    evidence_grade: none            # result-analysis: 不显著 q=0.2
    q_fdr: 0.2
    effect_size: 0.1
    ci95: [-0.1, 0.5]
    n: 60
    forbidden_zh: ["显著", "证明", "确立", "优于", "提升", "达到", "实现了"]
    provenance: {status: example_only, source: "示例事实源", locator: "需替换为真实跨域结果/统计输出"}
