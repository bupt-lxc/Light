<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Light Skills 科研主线</title>
  <desc id="desc">从问题材料到论文投稿的七阶段科研工作流，包含用户确认、诚信红线、展示软件和成果转化分支。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="0.54" stop-color="#F4F7FF"/>
      <stop offset="1" stop-color="#F8FCFA"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F8FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5CE1E6"/>
      <stop offset="0.5" stop-color="#7C6CFF"/>
      <stop offset="1" stop-color="#A86BFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#243056" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6D72F6"/>
    </marker>
    <style>
      .title { font: 700 34px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 16px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #5B6478; }
      .card-title { font: 700 19px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #101828; }
      .card-small { font: 500 12.5px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #667085; }
      .rail-title { font: 700 18px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #111827; }
      .rail-small { font: 500 13px "Inter", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #667085; }
      .num { font: 800 15px "Inter", Arial, sans-serif; fill: white; }
      .badge { font: 800 11px "Inter", Arial, sans-serif; fill: #5B21B6; letter-spacing: 0.7px; }
      .arrow { stroke: #6D72F6; stroke-width: 2.4; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .loop { stroke: #A78BFA; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 7; stroke-linecap: round; }
    </style>
  </defs>

  <rect x="18" y="18" width="1164" height="584" rx="34" fill="url(#bg)" stroke="#E3E8F7"/>
  <path d="M70 104 C250 10 410 46 548 106 C722 181 860 104 1045 54" stroke="#DDE6FF" stroke-width="28" opacity="0.42" fill="none"/>
  <path d="M82 558 C275 468 418 515 574 550 C784 598 919 525 1112 455" stroke="#D9FAF2" stroke-width="36" opacity="0.56" fill="none"/>

  <text x="60" y="68" class="title">从问题到交付：7 个可审计关口</text>
  <text x="60" y="98" class="subtitle">每一步都要求证据、产物和用户确认；不过关就回退，而不是让 agent 闷头自动跑到底。</text>

  <g filter="url(#shadow)">
    <g transform="translate(42 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">1</text>
      <text x="18" y="76" class="card-title">接收材料</text>
      <text x="18" y="104" class="card-small">读文件</text>
      <text x="18" y="124" class="card-small">建项目台账</text>
      <text x="18" y="164" class="card-small">file-reading</text>
      <text x="18" y="184" class="card-small">memory-pm</text>
    </g>

    <g transform="translate(204 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">2</text>
      <text x="18" y="76" class="card-title">查新检索</text>
      <text x="18" y="104" class="card-small">文献地图</text>
      <text x="18" y="124" class="card-small">证据来源</text>
      <text x="18" y="164" class="card-small">literature-search</text>
      <text x="18" y="184" class="card-small">citation</text>
    </g>

    <g transform="translate(366 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">3</text>
      <rect x="82" y="19" width="45" height="22" rx="11" fill="#EEE9FF"/><text x="104.5" y="34" text-anchor="middle" class="badge">GATE</text>
      <text x="18" y="76" class="card-title">想法批判</text>
      <text x="18" y="104" class="card-small">创新性先验</text>
      <text x="18" y="124" class="card-small">致命缺陷</text>
      <text x="18" y="164" class="card-small">idea-generation</text>
      <text x="18" y="184" class="card-small">idea-critique</text>
    </g>

    <g transform="translate(528 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">4</text>
      <text x="18" y="76" class="card-title">研究计划</text>
      <text x="18" y="104" class="card-small">假设 / 变量</text>
      <text x="18" y="124" class="card-small">对照 / 样本量</text>
      <text x="18" y="164" class="card-small">research-plan</text>
      <text x="18" y="184" class="card-small">research-ethics</text>
    </g>

    <g transform="translate(690 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">5</text>
      <text x="18" y="76" class="card-title">实验分析</text>
      <text x="18" y="104" class="card-small">数据工程</text>
      <text x="18" y="124" class="card-small">编码 / 统计</text>
      <text x="18" y="164" class="card-small">data-engineering</text>
      <text x="18" y="184" class="card-small">result-analysis</text>
    </g>

    <g transform="translate(852 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">6</text>
      <text x="18" y="76" class="card-title">图表论文</text>
      <text x="18" y="104" class="card-small">Python / R 图</text>
      <text x="18" y="124" class="card-small">写作 / 一致性</text>
      <text x="18" y="164" class="card-small">figure</text>
      <text x="18" y="184" class="card-small">paper-writing</text>
    </g>

    <g transform="translate(1014 150)">
      <rect width="145" height="210" rx="22" fill="url(#card)" stroke="#D9DDFE"/>
      <circle cx="28" cy="30" r="17" fill="url(#accent)"/><text x="28" y="35" text-anchor="middle" class="num">7</text>
      <rect x="82" y="19" width="45" height="22" rx="11" fill="#E6F7F3"/><text x="104.5" y="34" text-anchor="middle" class="badge">SHIP</text>
      <text x="18" y="76" class="card-title">投稿交付</text>
      <text x="18" y="104" class="card-small">LaTeX / 模板</text>
      <text x="18" y="124" class="card-small">期刊 / 回复</text>
      <text x="18" y="164" class="card-small">typesetting</text>
      <text x="18" y="184" class="card-small">venue-matching</text>
    </g>
  </g>

  <path class="arrow" d="M187 255 H197"/>
  <path class="arrow" d="M349 255 H359"/>
  <path class="arrow" d="M511 255 H521"/>
  <path class="arrow" d="M673 255 H683"/>
  <path class="arrow" d="M835 255 H845"/>
  <path class="arrow" d="M997 255 H1007"/>
  <path class="loop" d="M438 368 C413 402 341 400 314 355"/>
  <text x="297" y="394" class="card-small" fill="#7C3AED">不过关：回到 idea 修改</text>

  <g filter="url(#shadow)">
    <g transform="translate(60 430)">
      <rect width="330" height="112" rx="24" fill="#FFFFFF" stroke="#DDE3F8"/>
      <rect x="20" y="20" width="48" height="48" rx="16" fill="#EEF2FF"/>
      <text x="44" y="51" text-anchor="middle" font-size="24">✓</text>
      <text x="86" y="40" class="rail-title">诚信红线</text>
      <text x="86" y="68" class="rail-small">引用真实性、伦理、全文一致性</text>
      <text x="86" y="90" class="rail-small">citation · consistency · ethics</text>
    </g>
    <g transform="translate(435 430)">
      <rect width="330" height="112" rx="24" fill="#FFFFFF" stroke="#DDE3F8"/>
      <rect x="20" y="20" width="48" height="48" rx="16" fill="#ECFEFF"/>
      <text x="44" y="51" text-anchor="middle" font-size="24">▣</text>
      <text x="86" y="40" class="rail-title">展示 / 软件</text>
      <text x="86" y="68" class="rail-small">竞赛 demo、前端界面、系统结构</text>
      <text x="86" y="90" class="rail-small">frontend-design · system-design</text>
    </g>
    <g transform="translate(810 430)">
      <rect width="330" height="112" rx="24" fill="#FFFFFF" stroke="#DDE3F8"/>
      <rect x="20" y="20" width="48" height="48" rx="16" fill="#F5F3FF"/>
      <text x="44" y="51" text-anchor="middle" font-size="24">◆</text>
      <text x="86" y="40" class="rail-title">成果转化</text>
      <text x="86" y="68" class="rail-small">专利交底、软著材料、可审计证据包</text>
      <text x="86" y="90" class="rail-small">patent-disclosure · copyright</text>
    </g>
  </g>
</svg>
